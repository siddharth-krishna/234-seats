<tr id="seat-row-{{ c.id }}" class="hover:bg-gray-50">
  <td class="px-3 py-2 text-gray-400 text-xs">{{ c.number }}</td>
  <td class="px-3 py-2 font-medium">
    <a href="/admin/seat/{{ c.id }}" class="hover:text-indigo-600">{{ c.name }}</a>
  </td>
  <td class="px-3 py-2 text-gray-500 text-sm">{{ c.district }}</td>
  <td class="px-3 py-2">
    {% if c.predictions_open %}
      <span class="inline-flex items-center gap-1.5 text-xs font-medium text-green-700 bg-green-50 border border-green-200 rounded-full px-2 py-0.5">
        Open
      </span>
    {% else %}
      <span class="inline-flex items-center gap-1.5 text-xs font-medium text-gray-500 bg-gray-100 rounded-full px-2 py-0.5">
        Closed
      </span>
    {% endif %}
  </td>
  <td class="px-3 py-2 text-sm">
    {% if c.result %}
      <span class="text-indigo-700 font-medium">{{ c.result.winner_name }}</span>
    {% else %}
      <span class="text-gray-300">—</span>
    {% endif %}
  </td>
  <td class="px-3 py-2">
    <div class="flex items-center gap-2">
      {% if c.predictions_open %}
        <form method="post" action="/admin/seat/{{ c.id }}/predictions/close"
              hx-post="/admin/seat/{{ c.id }}/predictions/close"
              hx-target="#seat-row-{{ c.id }}" hx-swap="outerHTML">
          <button class="text-xs text-red-600 hover:underline">Close</button>
        </form>
      {% else %}
        <form method="post" action="/admin/seat/{{ c.id }}/predictions/open"
              hx-post="/admin/seat/{{ c.id }}/predictions/open"
              hx-target="#seat-row-{{ c.id }}" hx-swap="outerHTML">
          <button class="text-xs text-green-700 hover:underline">Open</button>
        </form>
      {% endif %}
      <a href="/admin/seat/{{ c.id }}" class="text-xs text-indigo-600 hover:underline">Edit</a>
    </div>
  </td>
</tr>
