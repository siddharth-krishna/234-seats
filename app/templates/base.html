<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}234 Seats{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
  <style>
    /* Tailwind CDN doesn't pick up arbitrary values — define reusable tokens here */
    .btn-primary {
      @apply rounded-md bg-red-600 hover:bg-red-700 text-white font-medium px-5 py-2 text-sm transition-colors;
    }
    .btn-secondary {
      @apply rounded-md bg-gray-800 hover:bg-gray-900 text-white font-medium px-5 py-2 text-sm transition-colors;
    }
    .input-base {
      @apply w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500;
    }
    .markdown-content h1,
    .markdown-content h2,
    .markdown-content h3,
    .markdown-content h4,
    .markdown-content h5,
    .markdown-content h6 {
      color: rgb(17 24 39);
      font-weight: 700;
      line-height: 1.2;
      margin-top: 1.25rem;
      margin-bottom: 0.75rem;
    }
    .markdown-content h1 { font-size: 1.875rem; }
    .markdown-content h2 { font-size: 1.5rem; }
    .markdown-content h3 { font-size: 1.25rem; }
    .markdown-content p,
    .markdown-content ul,
    .markdown-content ol,
    .markdown-content blockquote,
    .markdown-content pre {
      margin: 0.75rem 0;
    }
    .markdown-content ul,
    .markdown-content ol {
      padding-left: 1.5rem;
    }
    .markdown-content ul {
      list-style: disc;
    }
    .markdown-content ol {
      list-style: decimal;
    }
    .markdown-content a {
      color: rgb(220 38 38);
      text-decoration: underline;
    }
    .markdown-content blockquote {
      border-left: 3px solid rgb(229 231 235);
      padding-left: 1rem;
      color: rgb(75 85 99);
    }
    .markdown-content code {
      background: rgb(243 244 246);
      border-radius: 0.25rem;
      padding: 0.1rem 0.3rem;
      font-size: 0.875em;
    }
    .markdown-content pre {
      background: rgb(17 24 39);
      color: rgb(249 250 251);
      border-radius: 0.75rem;
      padding: 1rem;
      overflow-x: auto;
    }
    .markdown-content pre code {
      background: transparent;
      padding: 0;
      color: inherit;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <nav class="bg-white border-b border-gray-200 px-4 sm:px-6 py-0 flex items-stretch">
    <a href="/" class="flex items-center font-black text-xl tracking-tight text-red-600 py-3 pr-6 border-r border-gray-100 mr-6">
      234 Seats
    </a>
    <div class="flex items-center gap-5 text-sm ml-auto">
      {% if current_user %}
        <span class="text-gray-500">{{ current_user.username }}</span>
        {% if current_user.is_admin %}
          <a href="/admin" class="text-gray-700 hover:text-red-600 transition-colors">Admin</a>
        {% endif %}
        <form method="post" action="/logout" class="inline">
          <button type="submit" class="text-gray-400 hover:text-gray-700 transition-colors py-3">Log out</button>
        </form>
      {% else %}
        <a href="/login" class="text-red-600 hover:text-red-700 font-medium">Log in</a>
      {% endif %}
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
