{% extends "base.html" %}

{% block title %}Log in — 234 Seats{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <h1 class="text-2xl font-bold mb-6 text-center">Log in</h1>

  {% if error %}
    <div class="mb-4 rounded-md bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
      {{ error }}
    </div>
  {% endif %}

  <form method="post" action="/login" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col gap-4">
    <div>
      <label for="username" class="block text-sm font-medium mb-1">Username</label>
      <input
        id="username" name="username" type="text"
        required autofocus autocomplete="username"
        class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
    </div>
    <div>
      <label for="password" class="block text-sm font-medium mb-1">Password</label>
      <input
        id="password" name="password" type="password"
        required autocomplete="current-password"
        class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
    </div>
    <button
      type="submit"
      class="w-full rounded-md bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 text-sm transition-colors"
    >
      Log in
    </button>
  </form>
</div>
{% endblock %}
